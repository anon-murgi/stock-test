<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Dashboard</title>

  <!-- Plotly for charts, PapaParse for CSV parsing -->
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #f5f5f5;
      --surface:  #ffffff;
      --border:   #e0e0e0;
      --text:     #111111;
      --muted:    #666666;
      --accent:   #0052cc;
      --up:       #00875a;
      --down:     #de350b;
      --font:     'Inter', 'Segoe UI', system-ui, sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ─── Header ─── */
    header {
      background: #0a0a0a;
      color: #fff;
      padding: 0 24px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header .brand { font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
    header .updated { font-size: 11px; color: #888; }

    /* ─── Layout ─── */
    .container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

    /* ─── Controls ─── */
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .controls label { font-size: 12px; color: var(--muted); font-weight: 500; }
    select, input[type=date], input[type=text] {
      height: 34px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    select:focus, input:focus { border-color: var(--accent); }
    #ticker-select { min-width: 180px; font-weight: 600; }
    .range-btns { display: flex; gap: 4px; }
    .range-btn {
      padding: 0 10px;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      font-size: 12px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }
    .range-btn:hover, .range-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .divider { width: 1px; height: 24px; background: var(--border); }

    /* ─── KPI Cards ─── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
    }
    .kpi-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .kpi-value {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }
    .kpi-sub { font-size: 11px; color: var(--muted); }
    .kpi-value.up   { color: var(--up); }
    .kpi-value.down { color: var(--down); }

    /* ─── Charts ─── */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
    }
    .chart-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    #chart-candle { height: 380px; }
    #chart-volume { height: 140px; }

    /* ─── Table ─── */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .table-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .table-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    #row-count { font-size: 11px; color: var(--muted); }
    #search { width: 200px; }
    .table-wrap { overflow-x: auto; max-height: 480px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th {
      background: #f8f8f8;
      padding: 10px 12px;
      text-align: right;
      font-weight: 600;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 0;
      cursor: pointer;
      user-select: none;
    }
    thead th:first-child { text-align: left; }
    thead th:hover { color: var(--accent); }
    thead th .sort-icon { margin-left: 4px; opacity: 0.4; }
    thead th.sorted .sort-icon { opacity: 1; color: var(--accent); }
    tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.1s; }
    tbody tr:hover { background: #f8f8f8; }
    tbody td {
      padding: 9px 12px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    tbody td:first-child { text-align: left; font-weight: 500; }
    .cell-up   { color: var(--up); }
    .cell-down { color: var(--down); }

    /* ─── Loader / Error ─── */
    .loader-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--muted);
      font-size: 13px;
      gap: 10px;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: var(--down); }

    /* ─── Footer ─── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 11px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
  ⚙️  USER CONFIG — edit these two lines
═══════════════════════════════════════════ -->
<script>
  const CONFIG = {
    owner:  "your-github-username",   // ← GitHub username
    repo:   "your-repo-name",         // ← Repository name
    branch: "main",
  };

  // Derived base URL for raw file access
  CONFIG.rawBase = `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}`;
</script>
<!-- ══════════════════════════════════════════ -->

<header>
  <span class="brand">📈 Stock Dashboard</span>
  <span class="updated" id="last-updated">Loading…</span>
</header>

<div class="container">

  <!-- Controls -->
  <div class="controls">
    <label>Ticker</label>
    <select id="ticker-select"><option>Loading…</option></select>

    <div class="divider"></div>

    <label>Range</label>
    <div class="range-btns">
      <button class="range-btn" data-days="30">1M</button>
      <button class="range-btn" data-days="90">3M</button>
      <button class="range-btn" data-days="180">6M</button>
      <button class="range-btn active" data-days="365">1Y</button>
      <button class="range-btn" data-days="730">2Y</button>
      <button class="range-btn" data-days="0">All</button>
    </div>

    <div class="divider"></div>

    <label>From</label>
    <input type="date" id="date-from" />
    <label>To</label>
    <input type="date" id="date-to" />
  </div>

  <!-- KPI Cards -->
  <div class="kpi-row" id="kpi-row">
    <div class="loader-wrap"><div class="spinner"></div> Loading data…</div>
  </div>

  <!-- Charts -->
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Price — Candlestick</div>
      <div id="chart-candle"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Volume</div>
      <div id="chart-volume"></div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-header">
      <span class="table-title">OHLCV Data</span>
      <span id="row-count">—</span>
      <input type="text" id="search" placeholder="Search date…" />
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-col="Date">Date <span class="sort-icon">↕</span></th>
            <th data-col="Open">Open <span class="sort-icon">↕</span></th>
            <th data-col="High">High <span class="sort-icon">↕</span></th>
            <th data-col="Low">Low <span class="sort-icon">↕</span></th>
            <th data-col="Close">Close <span class="sort-icon">↕</span></th>
            <th data-col="Change">Chg % <span class="sort-icon">↕</span></th>
            <th data-col="Volume">Volume <span class="sort-icon">↕</span></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

</div>

<footer>
  Data sourced from Yahoo Finance via yfinance · Hosted on GitHub ·
  <a href="https://github.com/${CONFIG?.owner}/${CONFIG?.repo}" target="_blank" style="color:var(--accent)">View repo</a>
</footer>

<script>
// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let allRows    = [];   // full parsed dataset for current ticker
let filtered   = [];   // date-filtered rows
let sortCol    = "Date";
let sortDir    = -1;   // -1 = desc, 1 = asc
let activeDays = 365;

// ─────────────────────────────────────────────
//  FETCH HELPERS
// ─────────────────────────────────────────────
async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status} — ${url}`);
  return r.json();
}

async function fetchCSV(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status} — ${url}`);
  const text = await r.text();
  return new Promise((res, rej) => {
    Papa.parse(text, {
      header: true,
      skipEmptyLines: true,
      complete: result => res(result.data),
      error:    err    => rej(err),
    });
  });
}

// ─────────────────────────────────────────────
//  INIT — load manifest → populate ticker select
// ─────────────────────────────────────────────
async function init() {
  try {
    const manifest = await fetchJSON(`${CONFIG.rawBase}/data/manifest.json`);

    const sel = document.getElementById("ticker-select");
    sel.innerHTML = "";
    manifest.forEach(m => {
      const opt     = document.createElement("option");
      opt.value     = m.csv_path;
      opt.textContent = `${m.ticker}${m.name && m.name !== m.ticker ? "  —  " + m.name : ""}`;
      opt.dataset.meta = JSON.stringify(m);
      sel.appendChild(opt);
    });

    sel.addEventListener("change", () => loadTicker());
    loadTicker();
  } catch (e) {
    showError("kpi-row", `Could not load manifest.json — check your CONFIG.<br><code>${e.message}</code>`);
  }
}

// ─────────────────────────────────────────────
//  LOAD TICKER
// ─────────────────────────────────────────────
async function loadTicker() {
  const sel  = document.getElementById("ticker-select");
  const opt  = sel.selectedOptions[0];
  const meta = JSON.parse(opt.dataset.meta || "{}");
  const path = opt.value;

  document.getElementById("kpi-row").innerHTML =
    `<div class="loader-wrap"><div class="spinner"></div> Fetching ${meta.ticker}…</div>`;
  document.getElementById("table-body").innerHTML = "";

  try {
    const rows = await fetchCSV(`${CONFIG.rawBase}/${path}`);

    // Parse & enrich
    allRows = rows
      .filter(r => r.Date && r.Close)
      .map((r, i, arr) => {
        const close = parseFloat(r.Close);
        const prev  = i > 0 ? parseFloat(arr[i-1].Close) : close;
        return {
          Date:   r.Date,
          Open:   parseFloat(r.Open),
          High:   parseFloat(r.High),
          Low:    parseFloat(r.Low),
          Close:  close,
          Volume: parseInt(r.Volume) || 0,
          Change: prev !== 0 ? ((close - prev) / prev) * 100 : 0,
        };
      })
      .sort((a, b) => a.Date.localeCompare(b.Date));

    // Update header timestamp
    const updated = meta.last_updated
      ? new Date(meta.last_updated).toLocaleString("en-IN", { dateStyle: "medium", timeStyle: "short" })
      : "—";
    document.getElementById("last-updated").textContent = `Updated: ${updated}`;

    // Apply default range & render
    applyRange(activeDays);

  } catch (e) {
    showError("kpi-row", `Failed to load CSV.<br><code>${e.message}</code>`);
  }
}

// ─────────────────────────────────────────────
//  DATE FILTERING
// ─────────────────────────────────────────────
function applyRange(days) {
  activeDays = days;
  document.querySelectorAll(".range-btn").forEach(b => {
    b.classList.toggle("active", parseInt(b.dataset.days) === days);
  });

  let from, to;
  if (days === 0) {
    from = allRows[0]?.Date || "";
    to   = allRows[allRows.length - 1]?.Date || "";
  } else {
    const d = new Date();
    d.setDate(d.getDate() - days);
    from = d.toISOString().slice(0, 10);
    to   = new Date().toISOString().slice(0, 10);
  }

  document.getElementById("date-from").value = from;
  document.getElementById("date-to").value   = to;
  applyDateFilter(from, to);
}

function applyDateFilter(from, to) {
  filtered = allRows.filter(r => r.Date >= from && r.Date <= to);
  renderAll();
}

// ─────────────────────────────────────────────
//  RENDER ALL
// ─────────────────────────────────────────────
function renderAll() {
  renderKPIs();
  renderCharts();
  renderTable();
}

// ─────────────────────────────────────────────
//  KPI CARDS
// ─────────────────────────────────────────────
function renderKPIs() {
  if (!filtered.length) return;

  const last      = filtered[filtered.length - 1];
  const first     = filtered[0];
  const high52     = Math.max(...filtered.map(r => r.High));
  const low52      = Math.min(...filtered.map(r => r.Low));
  const avgVol     = filtered.reduce((s, r) => s + r.Volume, 0) / filtered.length;
  const periodChg  = ((last.Close - first.Close) / first.Close) * 100;
  const dayChg     = last.Change;

  const fmt  = n  => n.toLocaleString("en-IN", { maximumFractionDigits: 2 });
  const fmtV = n  => {
    if (n >= 1e7) return (n/1e7).toFixed(2) + " Cr";
    if (n >= 1e5) return (n/1e5).toFixed(2) + " L";
    return n.toLocaleString("en-IN");
  };

  const cards = [
    { label: "Latest Close",  value: "₹" + fmt(last.Close),
      sub: last.Date, cls: "" },
    { label: "Day Change",    value: (dayChg >= 0 ? "+" : "") + dayChg.toFixed(2) + "%",
      sub: `vs prev close`, cls: dayChg >= 0 ? "up" : "down" },
    { label: "Period Return", value: (periodChg >= 0 ? "+" : "") + periodChg.toFixed(2) + "%",
      sub: `${first.Date} → ${last.Date}`, cls: periodChg >= 0 ? "up" : "down" },
    { label: "Period High",   value: "₹" + fmt(high52),  sub: "Intraday high", cls: "" },
    { label: "Period Low",    value: "₹" + fmt(low52),   sub: "Intraday low",  cls: "" },
    { label: "Avg Volume",    value: fmtV(avgVol),        sub: "Daily avg",     cls: "" },
  ];

  document.getElementById("kpi-row").innerHTML = cards.map(c => `
    <div class="kpi-card">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value ${c.cls}">${c.value}</div>
      <div class="kpi-sub">${c.sub}</div>
    </div>`).join("");
}

// ─────────────────────────────────────────────
//  CHARTS (Plotly)
// ─────────────────────────────────────────────
function renderCharts() {
  if (!filtered.length) return;

  const dates  = filtered.map(r => r.Date);
  const opens  = filtered.map(r => r.Open);
  const highs  = filtered.map(r => r.High);
  const lows   = filtered.map(r => r.Low);
  const closes = filtered.map(r => r.Close);
  const vols   = filtered.map(r => r.Volume);
  const colors = filtered.map(r => r.Close >= r.Open ? "#00875a" : "#de350b");

  const layout = {
    margin:      { l: 55, r: 16, t: 8, b: 30 },
    paper_bgcolor: "#fff",
    plot_bgcolor:  "#fff",
    font:        { family: "'Inter','Segoe UI',sans-serif", size: 11, color: "#666" },
    xaxis: {
      showgrid: true, gridcolor: "#f0f0f0", gridwidth: 1,
      tickfont: { size: 10 },
      rangeslider: { visible: false },
    },
    yaxis: {
      showgrid: true, gridcolor: "#f0f0f0", gridwidth: 1,
      tickfont: { size: 10 }, tickprefix: "₹",
    },
  };

  const config = { displayModeBar: false, responsive: true };

  // Candlestick
  Plotly.newPlot("chart-candle", [{
    type: "candlestick",
    x: dates, open: opens, high: highs, low: lows, close: closes,
    increasing: { line: { color: "#00875a" }, fillcolor: "#00875a" },
    decreasing: { line: { color: "#de350b" }, fillcolor: "#de350b" },
    name: "",
    hoverinfo: "x+y",
  }], { ...layout, height: 380 }, config);

  // Volume bars
  Plotly.newPlot("chart-volume", [{
    type: "bar",
    x: dates, y: vols,
    marker: { color: colors, opacity: 0.7 },
    name: "Volume",
  }], {
    ...layout,
    height: 140,
    yaxis: {
      showgrid: true, gridcolor: "#f0f0f0",
      tickfont: { size: 10 },
      tickformat: ".2s",
    },
  }, config);
}

// ─────────────────────────────────────────────
//  TABLE
// ─────────────────────────────────────────────
function renderTable(searchQuery = "") {
  const query = searchQuery.toLowerCase();
  let rows = filtered.filter(r => !query || r.Date.includes(query));

  // Sort
  rows = [...rows].sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === "string") return sortDir * va.localeCompare(vb);
    return sortDir * (va - vb);
  });

  const fmt  = n => typeof n === "number" ? n.toLocaleString("en-IN", { maximumFractionDigits: 2 }) : n;
  const fmtV = n => n.toLocaleString("en-IN");

  document.getElementById("table-body").innerHTML = rows.map(r => {
    const chgCls = r.Change >= 0 ? "cell-up" : "cell-down";
    const sign   = r.Change >= 0 ? "+" : "";
    return `<tr>
      <td>${r.Date}</td>
      <td>${fmt(r.Open)}</td>
      <td>${fmt(r.High)}</td>
      <td>${fmt(r.Low)}</td>
      <td><strong>${fmt(r.Close)}</strong></td>
      <td class="${chgCls}">${sign}${r.Change.toFixed(2)}%</td>
      <td>${fmtV(r.Volume)}</td>
    </tr>`;
  }).join("");

  document.getElementById("row-count").textContent =
    `${rows.length.toLocaleString("en-IN")} rows`;
}

// ─────────────────────────────────────────────
//  SORT
// ─────────────────────────────────────────────
document.querySelectorAll("thead th").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = -1; }

    document.querySelectorAll("thead th").forEach(h => h.classList.remove("sorted"));
    th.classList.add("sorted");
    th.querySelector(".sort-icon").textContent = sortDir === -1 ? "↓" : "↑";
    renderTable(document.getElementById("search").value);
  });
});

// ─────────────────────────────────────────────
//  EVENT WIRING
// ─────────────────────────────────────────────
document.querySelectorAll(".range-btn").forEach(btn => {
  btn.addEventListener("click", () => applyRange(parseInt(btn.dataset.days)));
});

document.getElementById("date-from").addEventListener("change", () => {
  applyDateFilter(
    document.getElementById("date-from").value,
    document.getElementById("date-to").value
  );
});

document.getElementById("date-to").addEventListener("change", () => {
  applyDateFilter(
    document.getElementById("date-from").value,
    document.getElementById("date-to").value
  );
});

document.getElementById("search").addEventListener("input", e => {
  renderTable(e.target.value);
});

// ─────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────
function showError(containerId, msg) {
  document.getElementById(containerId).innerHTML =
    `<div class="loader-wrap error">⚠ ${msg}</div>`;
}

// ─────────────────────────────────────────────
//  START
// ─────────────────────────────────────────────
init();
</script>

</body>
</html>
